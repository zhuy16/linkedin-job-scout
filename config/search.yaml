# =============================================================================
#  config/search.yaml — ALL personal customisation lives here
#  This file is safe to commit (no passwords or personal details).
#  After editing, run:  bash scripts/setup.sh  to apply schedule changes.
# =============================================================================

# ── 1. Job search keywords ────────────────────────────────────────────────────
# LinkedIn boolean syntax: AND / OR / NOT, quotes for exact phrases.
# Replace the example below with your own field and role types.
# See: https://www.linkedin.com/help/linkedin/answer/a524335
query: '("Bioinformatics" OR "Computational Biology") NOT ("intern" OR "tutor")'

# Belt-and-suspenders filter applied AFTER fetching.
# Any job whose title or description contains these words is dropped.
skip_keywords:
  - "intern"
  - "internship"
  - "tutor"
  - "tutoring"

# ── 2. Scoring threshold ──────────────────────────────────────────────────────
# Only email jobs where the LLM fit score is AT OR ABOVE this value (0–100).
# 60 is a good starting point. Lower it temporarily if you want to see more
# results while tuning your profile_summary.txt.
fit_threshold: 60

# ── 3. Search window & job cap ────────────────────────────────────────────────
# days_back: how far back to search (1 = last 24 h; use 3 on weekends)
# max_jobs:  cap on jobs scored per run — each scored job costs ~$0.01 in API
days_back: 3
max_jobs: 25

# ── 4. LLM model ─────────────────────────────────────────────────────────────
# Latest model IDs: https://docs.anthropic.com/en/docs/about-claude/models
# claude-sonnet-4-5 gives the best cost/quality balance for job scoring.
# Approximate cost: ~$0.003 per job scored (3/10ths of a cent).
llm_model: "claude-sonnet-4-5"

# ── 5. Daily schedule (macOS only) ───────────────────────────────────────────
# Time to run the job scout automatically each day (24-hour format).
# After changing this, re-run:  bash scripts/setup.sh
# Your Mac must be awake at this time (sleep will delay to next wake).
schedule_hour: 8
schedule_minute: 0
